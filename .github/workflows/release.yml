name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: claude-settings-ui
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build
        working-directory: claude-settings-ui
        run: npm run dist
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-settings-ui/dist/*.dmg
            claude-settings-ui/dist/*.zip
          generate_release_notes: true
