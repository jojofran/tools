<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="800" height="240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fc"/>
      <stop offset="100%" stop-color="#eef0f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B4BFF"/>
      <stop offset="100%" stop-color="#8B6BFF"/>
    </linearGradient>
    <linearGradient id="accentLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E2FF"/>
      <stop offset="100%" stop-color="#D4C8FF"/>
    </linearGradient>
    <linearGradient id="gearSpin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8A8FF"/>
      <stop offset="100%" stop-color="#9C88FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#6B4BFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6B4BFF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="url(#bg)"/>

  <!-- Icon area - left side -->
  <g transform="translate(24, 60)" filter="url(#shadowDeep)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="30" fill="white" stroke="url(#accentLight)" stroke-width="1.5"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="18" fill="url(#accent)"/>

    <!-- Gear (Claude Settings) - top half -->
    <g transform="translate(0, 2)">
      <circle cx="-6" cy="-2" r="5" fill="#B8A8FF" opacity="0.9"/>
      <circle cx="-8" cy="-12" r="3" fill="white" opacity="0.7"/>
      <!-- Small gear dots -->
      <circle cx="-12" cy="-6" r="2" fill="white" opacity="0.5"/>
      <circle cx="-3" cy="-14" r="2" fill="white" opacity="0.5"/>
      <line x1="-6" y1="-7" x2="-6" y2="-12" stroke="white" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
      <line x1="-11" y1="-2" x2="-15" y2="-2" stroke="white" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
    </g>

    <!-- Plug/node (cc-connect) - bottom half -->
    <g transform="translate(6, 6)">
      <circle cx="6" cy="6" r="5" fill="#D4C8FF" opacity="0.9"/>
      <circle cx="8" cy="16" r="3" fill="white" opacity="0.7"/>
      <circle cx="14" cy="10" r="2" fill="white" opacity="0.5"/>
      <circle cx="3" cy="18" r="2" fill="white" opacity="0.5"/>
      <line x1="6" y1="11" x2="6" y2="15" stroke="white" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
      <line x1="11" y1="6" x2="14" y2="6" stroke="white" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round"/>
    </g>

    <!-- Connection arcs between gear and plug -->
    <path d="M 2 2 Q 8 4 6 8" stroke="white" stroke-width="1" fill="none" stroke-opacity="0.4"/>
    <path d="M -2 2 Q 2 6 4 10" stroke="white" stroke-width="1" fill="none" stroke-opacity="0.3"/>
  </g>

  <!-- Text area -->
  <g transform="translate(76, 0)">
    <!-- TOOLS -->
    <text x="0" y="51" font-family="'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#1a1a2e" letter-spacing="4">
      <tspan>TOOLS</tspan>
    </text>

    <!-- Accent bar -->
    <rect x="0" y="68" width="32" height="3.5" rx="1.75" fill="url(#accent)" filter="url(#shadow)"/>

    <!-- Subtitle -->
    <text x="0" y="93" font-family="'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#8888a0" letter-spacing="0.5">
      <tspan>Claude Settings</tspan>
      <tspan fill="#c8c8d8">  ·  </tspan>
      <tspan>cc-connect Config</tspan>
    </text>
  </g>
</svg>
