<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Connection node rings -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="white" stroke-width="3" opacity="0.12"/>
  <circle cx="256" cy="256" r="85" fill="none" stroke="white" stroke-width="2" opacity="0.18"/>

  <!-- Central node -->
  <circle cx="256" cy="256" r="50" fill="white" opacity="0.95"/>
  <circle cx="256" cy="256" r="35" fill="none" stroke="url(#bg)" stroke-width="4" opacity="0.25"/>
  <circle cx="256" cy="256" r="20" fill="#00C9A7" opacity="0.7"/>
  <circle cx="256" cy="256" r="8" fill="white"/>

  <!-- Connected outer nodes (network topology) -->
  <!-- Top node -->
  <circle cx="256" cy="120" r="22" fill="white" opacity="0.9"/>
  <circle cx="256" cy="120" r="12" fill="#00B4D8" opacity="0.6"/>
  <line x1="256" y1="142" x2="256" y2="200" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Right node -->
  <circle cx="392" cy="256" r="22" fill="white" opacity="0.9"/>
  <circle cx="392" cy="256" r="12" fill="#00B4D8" opacity="0.6"/>
  <line x1="306" y1="256" x2="370" y2="256" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Bottom-left node -->
  <circle cx="180" cy="360" r="22" fill="white" opacity="0.9"/>
  <circle cx="180" cy="360" r="12" fill="#00B4D8" opacity="0.6"/>
  <line x1="222" y1="316" x2="190" y2="348" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Bottom-right node -->
  <circle cx="340" cy="350" r="18" fill="white" opacity="0.7"/>
  <circle cx="340" cy="350" r="9" fill="#00B4D8" opacity="0.4"/>
  <line x1="280" y1="300" x2="328" y2="342" stroke="white" stroke-width="3" stroke-opacity="0.25" stroke-linecap="round"/>

  <!-- Left node -->
  <circle cx="148" cy="220" r="18" fill="white" opacity="0.7"/>
  <circle cx="148" cy="220" r="9" fill="#00B4D8" opacity="0.4"/>
  <line x1="205" y1="235" x2="166" y2="225" stroke="white" stroke-width="3" stroke-opacity="0.25" stroke-linecap="round"/>
</svg>
