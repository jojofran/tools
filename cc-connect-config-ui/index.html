<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cc-connect Config</title>
<style>
:root {
  --bg: #0d0d12;
  --surface: #15151d;
  --surface2: #1c1c28;
  --border: #2a2a3e;
  --text: #e2e2ef;
  --text2: #9d9db5;
  --accent: #7c6ef0;
  --accent-hover: #9489f5;
  --danger: #e5534b;
  --danger-hover: #f06a62;
  --success: #3fb950;
  --warning: #d29922;
  --radius: 8px;
  --radius-sm: 4px;
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --mono: "SF Mono","Fira Code","Cascadia Code",monospace;
  --transition: .15s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover)}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.header .logo{font-weight:700;font-size:16px;color:var(--accent)}
.header .path{font-size:12px;color:var(--text2);font-family:var(--mono);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header .status{font-size:12px;padding:3px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:5px}
.header .status.running{background:rgba(63,185,80,.15);color:var(--success)}
.header .status.stopped{background:rgba(229,83,75,.15);color:var(--danger)}
.header .status .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.header .status.running .dot{background:var(--success)}
.header .status.stopped .dot{background:var(--danger)}
.btn{padding:7px 16px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:500;cursor:pointer;transition:background var(--transition),opacity var(--transition);display:inline-flex;align-items:center;gap:6px;font-family:var(--font)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent-hover)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover:not(:disabled){background:var(--danger);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover:not(:disabled){background:var(--surface2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover:not(:disabled){background:#46c95a}
.btn-warning{background:transparent;color:var(--warning);border:1px solid var(--warning)}
.btn-warning:hover:not(:disabled){background:var(--warning);color:#fff}
.btn-group{display:flex;gap:6px}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:color var(--transition),border-color var(--transition);white-space:nowrap;user-select:none;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}

/* Content */
.content{padding:20px;max-width:1200px}
.tab-panel{display:none}
.tab-panel.active{display:block}
h2{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text)}
h3{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Form */
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-start}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:180px}
.form-group.full{width:100%;flex:none}
.form-group label{font-size:12px;font-weight:500;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:var(--font);transition:border var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:60px;font-family:var(--mono);font-size:12px}
.form-group select{cursor:pointer}
.form-group input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.form-group .hint{font-size:11px;color:var(--text2)}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.checkbox-row label{font-size:13px;cursor:pointer}

/* Cards */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;user-select:none}
.card-header .arrow{transition:transform var(--transition);color:var(--text2);font-size:12px}
.card-header .arrow.open{transform:rotate(90deg)}
.card-header .name{font-weight:500;font-size:14px;flex:1}
.card-body{display:none}
.card-body.open{display:block}
.card-actions{display:flex;gap:6px}

/* Array editor */
.array-editor{margin-bottom:8px}
.array-item{display:flex;gap:8px;align-items:center;margin-bottom:6px;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm)}
.array-item .val{flex:1;min-width:0}
.array-item .val input,.array-item .val select{width:100%}
.array-item .remove{background:none;border:none;color:var(--danger);cursor:pointer;padding:2px 6px;font-size:16px;line-height:1}
.array-add{margin-top:4px}

/* KV editor */
.kv-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm)}
.kv-row .k{flex:1}
.kv-row .v{flex:2}
.kv-row .k input,.kv-row .v input{width:100%}
.kv-row .remove{background:none;border:none;color:var(--danger);cursor:pointer;padding:2px 6px;font-size:16px;line-height:1}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:var(--radius);z-index:9999;font-size:13px;font-weight:500;max-width:400px;animation:slideUp .3s ease;display:none}
.toast.info{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.toast.success{background:rgba(63,185,80,.15);border:1px solid var(--success);color:var(--success)}
.toast.error{background:rgba(229,83,75,.15);border:1px solid var(--danger);color:var(--danger)}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9998;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;min-width:360px;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:12px}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Projects tab */
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.project-card .project-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background var(--transition)}
.project-card .project-header:hover{background:var(--surface2)}
.project-card .project-header .arrow{transition:transform var(--transition);color:var(--text2);font-size:12px}
.project-card .project-header .arrow.open{transform:rotate(90deg)}
.project-card .project-header .pname{font-weight:500;flex:1;font-size:14px}
.project-card .project-body{padding:0 16px 16px;display:none;border-top:1px solid var(--border)}
.project-card .project-body.open{display:block}

/* Sub-cards for platforms */
.platform-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;margin-top:8px}
.platform-card .pc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.platform-card .pc-header .ptype{font-weight:500;font-size:13px;flex:1}

/* Tab content within forms */
.form-section{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;background:var(--surface)}
.form-section .fs-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* Dirty indicator */
.dirty-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(210,153,34,.2);color:var(--warning);display:none}
.dirty-badge.show{display:inline-flex}

/* Raw TOML tab */
#rawEditor{width:100%;min-height:500px;font-family:var(--mono);font-size:12px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);resize:vertical;tab-size:2}
#rawEditor:focus{outline:none;border-color:var(--accent)}
.raw-actions{display:flex;gap:8px;margin-top:10px}

/* Empty state */
.empty-state{text-align:center;padding:32px 16px;color:var(--text2);font-size:13px}
.empty-state .icon{font-size:32px;margin-bottom:8px;opacity:.5}

/* Responsive */
@media(max-width:768px){
  .header{flex-direction:column;align-items:stretch;gap:8px}
  .tabs{padding:0 8px;overflow-x:auto}
  .tab{padding:8px 10px;font-size:12px}
  .content{padding:12px}
  .form-row{flex-direction:column}
  .form-group{min-width:100%}
}

/* Agent type badge */
.agent-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(124,110,240,.15);color:var(--accent)}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">cc-connect</div>
  <div class="path" id="configPath">~/.cc-connect/config.toml</div>
  <span class="status" id="daemonStatus"><span class="dot"></span><span id="statusText">Unknown</span></span>
  <span class="dirty-badge" id="dirtyBadge">未保存</span>
  <div class="btn-group">
    <button class="btn btn-primary" id="saveBtn" onclick="saveConfig()">保存</button>
    <button class="btn btn-danger" id="restartBtn" onclick="confirmRestart()">重启</button>
  </div>
</div>

<!-- Tab Navigation -->
<div class="tabs" id="tabNav">
  <button class="tab active" data-tab="projects">Projects</button>
  <button class="tab" data-tab="feishu">飞书模板</button>
  <button class="tab" data-tab="usergroups">用户组</button>
  <button class="tab" data-tab="global">全局</button>
  <button class="tab" data-tab="providers">Providers</button>
  <button class="tab" data-tab="commands">Commands</button>
  <button class="tab" data-tab="aliases">Aliases</button>
  <button class="tab" data-tab="hooks">Hooks</button>
  <button class="tab" data-tab="raw">Raw TOML</button>
</div>

<!-- Content -->
<div class="content" id="content">

<!-- ======== Projects Tab ======== -->
<div class="tab-panel active" id="panel-projects">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <h2 style="margin:0">Projects</h2>
    <button class="btn btn-primary btn-sm" onclick="addProject()">+ 添加项目</button>
  </div>
  <div id="projectsContainer"></div>
</div>

<!-- ======== Feishu Templates Tab ======== -->
<div class="tab-panel" id="panel-feishu">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <h2 style="margin:0">飞书应用模板</h2>
    <button class="btn btn-primary btn-sm" onclick="addFeishuTemplate()">+ 添加模板</button>
  </div>
  <p style="color:var(--text2);font-size:13px;margin-bottom:12px">定义飞书应用的 app_id / app_secret，可在项目里复用。</p>
  <div id="feishuTemplatesContainer"></div>
</div>

<!-- ======== User Groups Tab ======== -->
<div class="tab-panel" id="panel-usergroups">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <h2 style="margin:0">用户组模板</h2>
    <button class="btn btn-primary btn-sm" onclick="addUserGroupTemplate()">+ 添加用户组</button>
  </div>
  <p style="color:var(--text2);font-size:13px;margin-bottom:12px">定义 allow_from 用户/群组 ID 列表，可在项目里复用。</p>
  <div id="userGroupTemplatesContainer"></div>
</div>

<!-- ======== Global Tab ======== -->
<div class="tab-panel" id="panel-global">
  <h2>全局设置</h2>

  <div class="section">
    <div class="section-title">基础</div>
    <div class="form-row">
      <div class="form-group">
        <label>Language</label>
        <select id="gLang"><option value="">Auto</option><option value="en">English</option><option value="zh">中文</option></select>
      </div>
      <div class="form-group">
        <label>Log Level</label>
        <select id="gLogLevel"><option value="debug">debug</option><option value="info" selected>info</option><option value="warn">warn</option><option value="error">error</option></select>
      </div>
      <div class="form-group">
        <label>Data Dir</label>
        <input id="gDataDir" placeholder="~/.cc-connect">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Display</div>
    <div class="form-row">
      <div class="form-group">
        <label>Thinking Messages</label>
        <select id="gDisplayThinking"><option value="">Default (true)</option><option value="true">true</option><option value="false">false</option></select>
      </div>
      <div class="form-group">
        <label>Thinking Max Len</label>
        <input id="gDisplayThinkingMaxLen" type="number" placeholder="300">
      </div>
      <div class="form-group">
        <label>Tool Messages</label>
        <select id="gDisplayTool"><option value="">Default (true)</option><option value="true">true</option><option value="false">false</option></select>
      </div>
      <div class="form-group">
        <label>Tool Max Len</label>
        <input id="gDisplayToolMaxLen" type="number" placeholder="500">
      </div>
      <div class="form-group">
        <label>Idle Timeout (min)</label>
        <input id="gDisplayIdleTimeout" type="number" placeholder="120">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Rate Limit</div>
    <div class="form-row">
      <div class="form-group">
        <label>Max Messages</label>
        <input id="gRateMax" type="number" placeholder="20 (0=disabled)">
      </div>
      <div class="form-group">
        <label>Window (sec)</label>
        <input id="gRateWindow" type="number" placeholder="60">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Stream Preview</div>
    <div class="checkbox-row">
      <input type="checkbox" id="gStreamEnabled">
      <label for="gStreamEnabled">启用 Streaming Preview</label>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Interval (ms)</label>
        <input id="gStreamInterval" type="number" placeholder="1500">
      </div>
      <div class="form-group">
        <label>Min Delta Chars</label>
        <input id="gStreamMinDelta" type="number" placeholder="30">
      </div>
      <div class="form-group">
        <label>Max Chars</label>
        <input id="gStreamMaxChars" type="number" placeholder="2000">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Webhook</div>
    <div class="checkbox-row">
      <input type="checkbox" id="gWebhookEnabled">
      <label for="gWebhookEnabled">启用 Webhook</label>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Port</label>
        <input id="gWebhookPort" type="number" placeholder="9111">
      </div>
      <div class="form-group">
        <label>Path</label>
        <input id="gWebhookPath" placeholder="/hook">
      </div>
      <div class="form-group">
        <label>Token</label>
        <input id="gWebhookToken" placeholder="(optional)">
      </div>
    </div>
  </div>
</div>

<!-- ======== Providers Tab ======== -->
<div class="tab-panel" id="panel-providers">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <h2 style="margin:0">Providers</h2>
    <button class="btn btn-primary btn-sm" onclick="addProvider()">+ 添加 Provider</button>
  </div>
  <div id="providersContainer"></div>
</div>

<!-- ======== Commands Tab ======== -->
<div class="tab-panel" id="panel-commands">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <h2 style="margin:0">自定义命令</h2>
    <button class="btn btn-primary btn-sm" onclick="addCommand()">+ 添加命令</button>
  </div>
  <div id="commandsContainer"></div>
</div>

<!-- ======== Aliases Tab ======== -->
<div class="tab-panel" id="panel-aliases">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <h2 style="margin:0">别名</h2>
    <button class="btn btn-primary btn-sm" onclick="addAlias()">+ 添加别名</button>
  </div>
  <div id="aliasesContainer"></div>
</div>

<!-- ======== Hooks Tab ======== -->
<div class="tab-panel" id="panel-hooks">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <h2 style="margin:0">Hooks</h2>
    <button class="btn btn-primary btn-sm" onclick="addHook()">+ 添加 Hook</button>
  </div>
  <div id="hooksContainer"></div>
</div>

<!-- ======== Raw TOML Tab ======== -->
<div class="tab-panel" id="panel-raw">
  <h2>Raw TOML</h2>
  <p style="color:var(--text2);font-size:13px;margin-bottom:8px">直接编辑 TOML 内容。点击下方"应用到表单"可从 TOML 同步到表单。</p>
  <textarea id="rawEditor" spellcheck="false"></textarea>
  <div class="raw-actions">
    <button class="btn btn-primary btn-sm" onclick="saveRawToml()">保存 TOML</button>
    <button class="btn btn-outline btn-sm" onclick="applyRawToForm()">应用到表单</button>
    <button class="btn btn-outline btn-sm" onclick="syncRawFromForm()">从表单同步</button>
  </div>
</div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">确认</h3>
    <p id="modalBody" style="color:var(--text2);font-size:14px"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" id="modalConfirmBtn" onclick="closeModal()">确认</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let config = {};
let originalConfig = {};
let uiState = { feishuAppTemplates: [], userGroupTemplates: [] };
let dirty = false;
let projectIdCounter = 0;
let platformIdCounter = 0;
let providerIdCounter = 0;
let commandIdCounter = 0;
let aliasIdCounter = 0;
let hookIdCounter = 0;

// ============================================================
// Helpers
// ============================================================
const $ = (id) => document.getElementById(id);
const escHtml = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function toast(msg, type = "info") {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast " + type;
  t.style.display = "block";
  clearTimeout(t._hide);
  t._hide = setTimeout(() => { t.style.display = "none"; }, 3500);
}

function showModal(title, body, confirmLabel, cb) {
  $("modalTitle").textContent = title;
  $("modalBody").textContent = body;
  $("modalConfirmBtn").textContent = confirmLabel;
  $("modalOverlay").classList.add("open");
  $("modalConfirmBtn").onclick = () => { closeModal(); if (cb) cb(); };
}
function closeModal() { $("modalOverlay").classList.remove("open"); }

function markDirty() {
  if (!dirty) {
    dirty = true;
    $("dirtyBadge").classList.add("show");
  }
}

function cleanDirty() {
  dirty = false;
  $("dirtyBadge").classList.remove("show");
}

function uuid() {
  return Math.random().toString(36).slice(2, 8);
}

function setNested(obj, path, val) {
  const keys = path.split(".");
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    if (!cur[keys[i]] || typeof cur[keys[i]] !== "object") cur[keys[i]] = {};
    cur = cur[keys[i]];
  }
  if (val === "" || val === null || val === undefined) {
    delete cur[keys[keys.length - 1]];
  } else {
    cur[keys[keys.length - 1]] = val;
  }
}

function getNested(obj, path, def) {
  const keys = path.split(".");
  let cur = obj;
  for (const k of keys) {
    if (cur === null || cur === undefined || typeof cur !== "object") return def;
    cur = cur[k];
  }
  return cur !== undefined ? cur : def;
}

// Checkbox helpers: TOML expects booleans, HTML uses checkbox state
function getCb(id) { return $(id).checked; }
function setCb(id, val) { $(id).checked = !!val; }
function getSel(id) { return $(id).value; }
function setSel(id, val) { $(id).value = val || ""; }
function getInp(id) { return $(id).value; }
function setInp(id, val) { $(id).value = val !== null && val !== undefined ? val : ""; }
function getNum(id) { const v = $(id).value; return v !== "" ? Number(v) : ""; }
function setNum(id, val) { $(id).value = val !== null && val !== undefined && val !== "" ? val : ""; }
function getBool(v) {
  if (v === true || v === "true") return true;
  if (v === false || v === "false") return false;
  return null; // not set
}
function setBool(v) {
  if (v === true) return "true";
  if (v === false) return "false";
  return "";
}

// ============================================================
// API
// ============================================================
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || "Request failed");
  return data;
}

async function loadConfig() {
  try {
    const data = await api("GET", "/api/config");
    config = data.config || {};
    // Normalize projects
    if (!config.projects) config.projects = [];
    if (!Array.isArray(config.projects)) config.projects = [];
    originalConfig = JSON.parse(JSON.stringify(config));
    cleanDirty();
    renderAll();
  } catch (e) {
    toast("加载配置失败: " + e.message, "error");
  }
}

async function loadState() {
  try {
    const data = await api("GET", "/api/state");
    if (!data.feishuAppTemplates) data.feishuAppTemplates = [];
    if (!data.userGroupTemplates) data.userGroupTemplates = [];
    uiState = data;
  } catch (e) {
    uiState = { feishuAppTemplates: [], userGroupTemplates: [] };
  }
}

async function saveState() {
  try {
    await api("PUT", "/api/state", uiState);
  } catch (e) {
    console.error("Failed to save state:", e);
  }
}

async function saveConfig() {
  $("saveBtn").disabled = true;
  $("saveBtn").textContent = "保存中...";
  try {
    collectAll();
    const data = { config };
    await api("PUT", "/api/config", data);
    originalConfig = JSON.parse(JSON.stringify(config));
    cleanDirty();
    renderAll();
    toast("配置已保存（备份已创建）", "success");
  } catch (e) {
    toast("保存失败: " + e.message, "error");
  } finally {
    $("saveBtn").disabled = false;
    $("saveBtn").textContent = "保存";
  }
}

async function confirmRestart() {
  showModal("重启 cc-connect", "将重启 cc-connect 守护进程，活跃会话可能中断。确定？", "重启", async () => {
    $("restartBtn").disabled = true;
    $("restartBtn").textContent = "重启中...";
    try {
      const res = await api("POST", "/api/restart");
      toast("cc-connect 已重启", "success");
      setTimeout(updateInfo, 1000);
    } catch (e) {
      toast("重启失败: " + e.message, "error");
    } finally {
      $("restartBtn").disabled = false;
      $("restartBtn").textContent = "重启";
    }
  });
}

async function updateInfo() {
  try {
    const info = await api("GET", "/api/info");
    $("configPath").textContent = info.configPath;
    const st = $("daemonStatus");
    const stText = $("statusText");
    if (info.daemonRunning) {
      st.className = "status running";
      stText.textContent = "Running";
    } else {
      st.className = "status stopped";
      stText.textContent = "Stopped";
    }
  } catch (e) {
    // ignore
  }
}

// Collect All Form Data
// ============================================================
function collectAll() {
  // Global
  setNested(config, "language", getSel("gLang") || undefined);
  if (getSel("gLogLevel") !== "info") setNested(config, "log.level", getSel("gLogLevel"));
  else delete (config.log && config.log.level);
  setNested(config, "data_dir", getInp("gDataDir") || undefined);

  // Display
  const dt = getBool(getSel("gDisplayThinking"));
  setNested(config, "display.thinking_messages", dt);
  const dn = getNum("gDisplayThinkingMaxLen");
  setNested(config, "display.thinking_max_len", dn);
  const dtool = getBool(getSel("gDisplayTool"));
  setNested(config, "display.tool_messages", dtool);
  const dtn = getNum("gDisplayToolMaxLen");
  setNested(config, "display.tool_max_len", dtn);
  const didle = getNum("gDisplayIdleTimeout");
  setNested(config, "display.idle_timeout_mins", didle);

  // Rate limit
  const rm = getNum("gRateMax");
  setNested(config, "rate_limit.max_messages", rm);
  const rw = getNum("gRateWindow");
  setNested(config, "rate_limit.window_secs", rw);

  // Stream preview
  if (getCb("gStreamEnabled")) {
    setNested(config, "stream_preview.enabled", true);
    setNested(config, "stream_preview.interval_ms", getNum("gStreamInterval") || undefined);
    setNested(config, "stream_preview.min_delta_chars", getNum("gStreamMinDelta") || undefined);
    setNested(config, "stream_preview.max_chars", getNum("gStreamMaxChars") || undefined);
  } else {
    setNested(config, "stream_preview", undefined);
  }

  // Webhook
  if (getCb("gWebhookEnabled")) {
    setNested(config, "webhook.enabled", true);
    setNested(config, "webhook.port", getNum("gWebhookPort") || undefined);
    setNested(config, "webhook.path", getInp("gWebhookPath") || undefined);
    setNested(config, "webhook.token", getInp("gWebhookToken") || undefined);
  } else {
    setNested(config, "webhook", undefined);
  }

  // Clean up empty objects
  if (config.display && Object.keys(config.display).length === 0) delete config.display;
  if (config.rate_limit && Object.keys(config.rate_limit).length === 0) delete config.rate_limit;
  if (config.stream_preview && Object.keys(config.stream_preview).length === 0) delete config.stream_preview;
  if (config.log && Object.keys(config.log).length === 0) delete config.log;

  // Collect projects from DOM
  collectProjectsFromDom();

  // Collect providers, commands, aliases, hooks from DOM
  config.providers = collectArrayFromDom("providers", collectProviderItem);
  config.commands = collectArrayFromDom("commands", collectCommandItem);
  config.aliases = collectArrayFromDom("aliases", collectAliasItem);
  config.hooks = collectArrayFromDom("hooks", collectHookItem);
}

function collectArrayFromDom(containerId, collectFn) {
  const container = $(containerId + "Container");
  if (!container) return [];
  const items = [];
  container.querySelectorAll("[data-id]").forEach(el => {
    const item = collectFn(el);
    if (item) items.push(item);
  });
  return items.length > 0 ? items : undefined;
}

function collectProviderItem(el) {
  return {
    name: el.querySelector(".f-name input").value || undefined,
    api_key: el.querySelector(".f-apikey input").value || undefined,
    base_url: el.querySelector(".f-baseurl input").value || undefined,
    model: el.querySelector(".f-model input").value || undefined,
  };
}

function collectCommandItem(el) {
  const hasExec = el.querySelector(".f-type select").value === "exec";
  return {
    name: el.querySelector(".f-cmdname input").value || undefined,
    description: el.querySelector(".f-cmddesc input").value || undefined,
    prompt: hasExec ? undefined : el.querySelector(".f-cmdprompt textarea").value || undefined,
    exec: hasExec ? el.querySelector(".f-cmdexec input").value || undefined : undefined,
    work_dir: el.querySelector(".f-cmdworkdir input").value || undefined,
  };
}

function collectAliasItem(el) {
  return {
    name: el.querySelector(".f-aliasname input").value || undefined,
    command: el.querySelector(".f-aliasmatch input").value || undefined,
  };
}

function collectHookItem(el) {
  const type = el.querySelector(".f-hooktype select").value;
  return {
    event: el.querySelector(".f-hookevent input").value || undefined,
    type: type || undefined,
    command: type === "command" ? el.querySelector(".f-hookcmd input").value || undefined : undefined,
    url: type === "http" ? el.querySelector(".f-hookurl input").value || undefined : undefined,
    async: getBool(el.querySelector(".f-hookasync select").value) ?? undefined,
    timeout: el.querySelector(".f-hooktimeout input").value ? Number(el.querySelector(".f-hooktimeout input").value) : undefined,
  };
}

// ============================================================
// Collect Projects from DOM
// ============================================================
function collectProjectsFromDom() {
  const container = $("projectsContainer");
  const projectEls = container.querySelectorAll("[data-project-id]");
  const projects = [];

  projectEls.forEach(projEl => {
    const projId = projEl.dataset.projectId;
    const p = {};

    p.name = projEl.querySelector(".f-projname input").value || "";

    // Agent
    const agentType = projEl.querySelector(".f-agenttype select").value;
    if (agentType) {
      p.agent = { type: agentType };
      const opts = {};
      const workDir = projEl.querySelector(".f-workdir input").value;
      const mode = projEl.querySelector(".f-mode select").value;
      const model = projEl.querySelector(".f-model input").value;
      const reasoning = projEl.querySelector(".f-reasoning select").value;
      const timeout = projEl.querySelector(".f-timeout input").value;
      const cmd = projEl.querySelector(".f-cmd input").value;
      if (workDir) opts.work_dir = workDir;
      if (mode) opts.mode = mode;
      if (model) opts.model = model;
      if (reasoning) opts.reasoning_effort = reasoning;
      if (timeout) opts.timeout_mins = Number(timeout);
      if (cmd) opts.cmd = cmd;
      if (Object.keys(opts).length > 0) p.agent.options = opts;

      // Agent providers
      const provEls = projEl.querySelectorAll("[data-ap-id]");
      if (provEls.length > 0) {
        p.agent.providers = [];
        provEls.forEach(apEl => {
          const ap = {
            name: apEl.querySelector(".f-ap-name input").value || undefined,
            api_key: apEl.querySelector(".f-ap-apikey input").value || undefined,
            base_url: apEl.querySelector(".f-ap-baseurl input").value || undefined,
            model: apEl.querySelector(".f-ap-model input").value || undefined,
          };
          if (ap.name) p.agent.providers.push(ap);
        });
        if (p.agent.providers.length === 0) delete p.agent.providers;
      }
    }

    // Platforms
    const platEls = projEl.querySelectorAll("[data-plat-id]");
    if (platEls.length > 0) {
      p.platforms = [];
      platEls.forEach(plEl => {
        const pt = plEl.querySelector(".f-plat-type select").value;
        if (!pt) return;
        const po = {};
        const arrayFields = ["allow_from", "allowed_tools", "disallowed_tools", "allow_users", "allow_chats"];
        const opts = plEl.querySelectorAll("[data-popt]");
        opts.forEach(opt => {
          const key = opt.dataset.popt;
          if (opt.tagName === "INPUT" && opt.type === "checkbox") {
            po[key] = opt.checked || undefined;
          } else if (arrayFields.includes(key) && opt.value) {
            po[key] = opt.value.split(",").map(s => s.trim()).filter(Boolean);
          } else {
            po[key] = opt.value || undefined;
          }
        });
        p.platforms.push({ type: pt, options: po });
      });
    }

    // Other project settings
    const adminFrom = projEl.querySelector(".f-adminfrom input").value;
    if (adminFrom) p.admin_from = adminFrom;
    const disabled = projEl.querySelector(".f-disabledcmds input").value;
    if (disabled) p.disabled_commands = disabled.split(",").map(s => s.trim()).filter(Boolean);

    projects.push(p);
  });

  config.projects = projects.length > 0 ? projects : undefined;
}

// ============================================================
// Tab System
// ============================================================
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    const panel = $("panel-" + tab.dataset.tab);
    if (panel) panel.classList.add("active");
    if (tab.dataset.tab === "raw") updateRawToml();
  });
});

function renderGlobal() {
  setSel("gLang", config.language || "");
  setSel("gLogLevel", getNested(config, "log.level", "info"));
  setInp("gDataDir", config.data_dir || "");

  const d = config.display || {};
  setSel("gDisplayThinking", setBool(d.thinking_messages));
  setNum("gDisplayThinkingMaxLen", d.thinking_max_len);
  setSel("gDisplayTool", setBool(d.tool_messages));
  setNum("gDisplayToolMaxLen", d.tool_max_len);
  setNum("gDisplayIdleTimeout", d.idle_timeout_mins);

  const rl = config.rate_limit || {};
  setNum("gRateMax", rl.max_messages);
  setNum("gRateWindow", rl.window_secs);

  const sp = config.stream_preview || {};
  setCb("gStreamEnabled", sp.enabled === true);
  setNum("gStreamInterval", sp.interval_ms);
  setNum("gStreamMinDelta", sp.min_delta_chars);
  setNum("gStreamMaxChars", sp.max_chars);

  const wh = config.webhook || {};
  setCb("gWebhookEnabled", wh.enabled === true);
  setNum("gWebhookPort", wh.port);
  setInp("gWebhookPath", wh.path);
  setInp("gWebhookToken", wh.token);
}

  return `
  <div class="project-card" data-project-id="${id}">
    <div class="project-header" onclick="toggleProject(this)">

      <div class="form-section">
        <div class="fs-title">基本信息</div>

          </div>
          <div class="form-group">
            <label>admin_from</label>
            <div class="f-adminfrom"><input value="${escHtml(p.admin_from || "")}" placeholder="用户open_id或*" onchange="markDirty()"></div>
          </div>
          <div class="form-group">
            <label>禁用命令</label>
            <div class="f-disabledcmds"><input value="${escHtml((p.disabled_commands||[]).join(", "))}" placeholder="逗号分隔" onchange="markDirty()"></div>
          </div>

      </div>

      <div class="form-section">
        <div class="fs-title">Agent</div>
        <div class="form-row">
          <div class="form-group">
            <label>类型</label>
            <div class="f-agenttype"><select onchange="markDirty()">${agentTypes.map(t => `<option value="${t}"${agent.type===t?" selected":""}>${t}</option>`).join("")}</select></div>
          </div>
          <div class="form-group">
            <label>work_dir</label>

          </div>

            <label>mode</label>
            <div class="f-mode"><select onchange="markDirty()"><option value="">Default</option>${modes.map(m => `<option value="${m}"${agentOpts.mode===m?" selected":""}>${m}</option>`).join("")}</select></div>

            <label>model</label>

          </div>

            <div class="f-reasoning"><select onchange="markDirty()"><option value="">Default</option>${reasoningEfforts.map(r => `<option value="${r}"${agentOpts.reasoning_effort===r?" selected":""}>${r||"none"}</option>`).join("")}</select></div>
          </div>
          <div class="form-group">
            <label>timeout (min)</label>

function toggleProject(header) {
  const body = header.parentElement.querySelector(".project-body");
  const arrow = header.querySelector(".arrow");
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}

function removeProject(btn) {
  const card = btn.closest("[data-project-id]");
  showModal("删除项目", "确定删除此项目？", "删除", () => {
    card.remove();
    markDirty();
  });
}

function addProject() {
  if (!config.projects) config.projects = [];
  const p = { name: "new-project", agent: { type: "claudecode" } };
  config.projects.push(p);
  const container = $("projectsContainer");
  container.insertAdjacentHTML("beforeend", renderProjectCard(p, config.projects.length - 1));
  markDirty();
}

function renderPlatformCard(pl, idx) {
  const id = "plat_" + (pl._uid || uuid());
  pl._uid = id;
  const opts = pl.options || {};
  const pt = pl.type || "feishu";
  const fields = PLATFORM_OPTIONS[pt] || PLATFORM_OPTIONS.feishu;

  // Build template selectors
  const feishuAppOpts = (uiState.feishuAppTemplates || []).map(t =>
    `<option value="${escHtml(t.name)}">${escHtml(t.name)}</option>`
  ).join("");
  const userGroupOpts = (uiState.userGroupTemplates || []).map(t =>
    `<option value="${escHtml(t.name)}">${escHtml(t.name)}</option>`
  ).join("");

  return `
  <div class="platform-card" data-plat-id="${id}">
    <div class="pc-header">
      <span class="ptype">Platform #${idx + 1}</span>
      <div class="f-plat-type">
        <select onchange="changePlatformType(this);markDirty()">
          ${PLATFORM_TYPES.map(t => `<option value="${t}"${pt===t?" selected":""}>${t}</option>`).join("")}
        </select>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removePlatform(this)">删除</button>
    </div>
    <div class="pc-body">
      ${feishuAppOpts ? `
      <div class="form-row">
        <div class="form-group">
          <label>套用飞书模板</label>
          <select onchange="applyFeishuTemplate(this, '${id}')">
            <option value="">—— 不套用 ——</option>
            ${feishuAppOpts}
          </select>
        </div>
      </div>` : ""}
      ${userGroupOpts ? `
      <div class="form-row">
        <div class="form-group">
          <label>套用用户组模板</label>
          <select onchange="applyUserGroupTemplate(this, '${id}')">
            <option value="">—— 不套用 ——</option>
            ${userGroupOpts}
          </select>
        </div>
      </div>` : ""}
      <div class="form-row platform-fields" data-platform="${pt}">
        ${fields.map(f => renderPlatformField(f, opts)).join("")}
      </div>
    </div>
  </div>`;
}

function renderPlatformField(f, opts) {
  const val = opts[f.key];
  // Convert arrays to comma-separated string for display
  const displayVal = Array.isArray(val) ? val.join(", ") : (val || "");
  if (f.type === "checkbox") {
    const checked = val === true || val === "true" ? "checked" : "";
    return `<div class="form-group" style="min-width:120px">
      <label>${escHtml(f.label)}</label>
      <div class="checkbox-row"><input type="checkbox" data-popt="${f.key}" ${checked} onchange="markDirty()"></div>
    </div>`;
  }
  if (f.type === "select") {
    const options = (f.options||[]).map(o => `<option value="${o}"${val===o?" selected":""}>${o}</option>`).join("");
    return `<div class="form-group">
      <label>${escHtml(f.label)}</label>
      <select data-popt="${f.key}" onchange="markDirty()">${options}</select>
    </div>`;
  }
  return `<div class="form-group">
    <label>${escHtml(f.label)}</label>
    <input type="${f.type||"text"}" data-popt="${f.key}" value="${escHtml(displayVal)}" placeholder="${escHtml(f.label)}" onchange="markDirty()">
  </div>`;
}

function applyFeishuTemplate(sel, platId) {
  const name = sel.value;
  if (!name) return;
  const tpl = (uiState.feishuAppTemplates || []).find(t => t.name === name);
  if (!tpl) return;
  const platCard = sel.closest("[data-plat-id]");
  const appIdInput = platCard.querySelector('[data-popt="app_id"]');
  const appSecretInput = platCard.querySelector('[data-popt="app_secret"]');
  if (appIdInput) { appIdInput.value = tpl.app_id || ""; }
  if (appSecretInput) { appSecretInput.value = tpl.app_secret || ""; }
  markDirty();
  toast(`已套用飞书模板: ${name}`, "success");
}

function applyUserGroupTemplate(sel, platId) {
  const name = sel.value;
  if (!name) return;
  const tpl = (uiState.userGroupTemplates || []).find(t => t.name === name);
  if (!tpl) return;
  const platCard = sel.closest("[data-plat-id]");
  const allowFromInput = platCard.querySelector('[data-popt="allow_from"]');
  if (allowFromInput && tpl.allow_from) {
    allowFromInput.value = tpl.allow_from.join(", ");
    markDirty();
  }
  toast(`已套用用户组模板: ${name}`, "success");
}

function changePlatformType(sel) {
  const card = sel.closest(".platform-card");
  const fieldsContainer = card.querySelector(".platform-fields");
  const newType = sel.value;
  const opts = {};
  // Save current values
  fieldsContainer.querySelectorAll("[data-popt]").forEach(el => {
    opts[el.dataset.popt] = el.tagName === "INPUT" && el.type === "checkbox" ? el.checked : el.value;
  });
  // Re-render fields for new type
  const fields = PLATFORM_OPTIONS[newType] || PLATFORM_OPTIONS.feishu;
  fieldsContainer.innerHTML = fields.map(f => renderPlatformField(f, opts)).join("");
  markDirty();
}

function removePlatform(btn) {
  btn.closest(".platform-card").remove();
  markDirty();
}

function addPlatform(btn) {
  const list = btn.closest(".form-section").querySelector(".platforms-list");
  const pl = { type: "feishu", options: {} };
  list.insertAdjacentHTML("beforeend", renderPlatformCard(pl, list.children.length));
  markDirty();
}

function addFeishuTemplate() {
  if (!uiState.feishuAppTemplates) uiState.feishuAppTemplates = [];

// Hooks Tab
// ============================================================
const HOOK_EVENTS = ["message.received","message.sent","session.started","session.ended","cron.triggered","permission.requested","error","*"];

function renderHooks() {
  const container = $("hooksContainer");
  const hooks = config.hooks || [];
  if (hooks.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🪝</div>暂无 Hook</div>`;
    return;
  }
  container.innerHTML = hooks.map((h, i) => {
    const isHttp = h.type === "http";
    return `
    <div class="card" data-id="${i}">
      <div class="form-row">
        <div class="form-group f-hookevent">
          <label>Event</label>
          <select onchange="markDirty()">${HOOK_EVENTS.map(e => `<option value="${e}"${h.event===e?" selected":""}>${e}</option>`).join("")}</select>
        </div>
        <div class="form-group f-hooktype" style="min-width:100px">
          <label>Type</label>
          <select onchange="toggleHookType(this);markDirty()">
            <option value="command" ${isHttp?"":"selected"}>Command</option>
            <option value="http" ${isHttp?"selected":""}>HTTP</option>
          </select>
        </div>
        <div class="form-group f-hookcmd" style="${isHttp?'display:none':''}">
          <label>Command</label>
          <input value="${escHtml(h.command||"")}" onchange="markDirty()">
        </div>
        <div class="form-group f-hookurl" style="${isHttp?'':'display:none'}">
          <label>URL</label>
          <input value="${escHtml(h.url||"")}" onchange="markDirty()">
        </div>
        <div class="form-group f-hookasync">
          <label>Async</label>
          <select onchange="markDirty()"><option value="">Default</option><option value="true" ${h.async===true?"selected":""}>true</option><option value="false" ${h.async===false?"selected":""}>false</option></select>
        </div>
        <div class="form-group f-hooktimeout">
          <label>Timeout (s)</label>
          <input type="number" value="${h.timeout||""}" onchange="markDirty()">
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="this.closest('.card').remove();markDirty()">删除</button>
    </div>`;
  }).join("");
}

function toggleHookType(sel) {
  const card = sel.closest(".card");
  const isHttp = sel.value === "http";
  card.querySelector(".f-hookcmd").style.display = isHttp ? "none" : "";
  card.querySelector(".f-hookurl").style.display = isHttp ? "" : "none";
}

function addHook() {
  if (!config.hooks) config.hooks = [];
  config.hooks.push({ event: "message.received", type: "command", command: "" });
  renderHooks();
  markDirty();
}

// ============================================================
// Raw TOML
// ============================================================
function updateRawToml() {
  // Create a clean copy without _uid fields
  const clean = JSON.parse(JSON.stringify(config, (k, v) => k.startsWith("_") ? undefined : v));
  // Smol-toml stringify is used on the server; here we show a simple representation
  $("rawEditor").value = JSON.stringify(clean, null, 2);
}

function syncRawFromForm() {
  collectAll();
  updateRawToml();
  toast("已从表单同步到 TOML", "info");
}

function applyRawToForm() {
  try {
    const parsed = JSON.parse($("rawEditor").value);
    config = parsed;
    if (!config.projects) config.projects = [];
    originalConfig = JSON.parse(JSON.stringify(config));
    renderAll();
    toast("已从 TOML 应用到表单", "success");
  } catch (e) {
    toast("JSON 解析失败: " + e.message, "error");
  }
}

async function saveRawToml() {
  try {
    const raw = $("rawEditor").value;
    const parsed = JSON.parse(raw);
    config = parsed;
    if (!config.projects) config.projects = [];
    await api("PUT", "/api/config", { config });
    originalConfig = JSON.parse(JSON.stringify(config));
    cleanDirty();
    renderAll();
    toast("配置已保存（备份已创建）", "success");
  } catch (e) {
    toast("保存失败: " + e.message, "error");
  }
}

// Init
// ============================================================
async function init() {
  await loadState();
  await loadConfig();
  updateInfo();
  renderFeishuTemplates();
  renderUserGroupTemplates();
  setInterval(updateInfo, 30000);
}

init();
