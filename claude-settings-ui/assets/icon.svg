<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B4BFF"/>
      <stop offset="100%" stop-color="#8B6BFF"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (macOS applies its own corner mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Gear outer ring -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="white" stroke-width="4" opacity="0.15"/>

  <!-- Gear teeth -->
  <g stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.35">
    <line x1="256" y1="128" x2="256" y2="148"/>
    <line x1="256" y1="364" x2="256" y2="384"/>
    <line x1="128" y1="256" x2="148" y2="256"/>
    <line x1="364" y1="256" x2="384" y2="256"/>
    <line x1="165" y1="165" x2="179" y2="179"/>
    <line x1="333" y1="333" x2="347" y2="347"/>
    <line x1="347" y1="165" x2="333" y2="179"/>
    <line x1="179" y1="333" x2="165" y2="347"/>
  </g>

  <!-- Gear main circle -->
  <circle cx="256" cy="256" r="80" fill="white" opacity="0.95"/>

  <!-- Gear inner -->
  <circle cx="256" cy="256" r="55" fill="none" stroke="url(#bg)" stroke-width="6" opacity="0.3"/>
  <circle cx="256" cy="256" r="36" fill="url(#bg)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="white" opacity="0.9"/>

  <!-- Wrench/spanner accent -->
  <g transform="translate(256, 256) rotate(-30)">
    <rect x="-4" y="-50" width="8" height="40" rx="4" fill="white" opacity="0.4" transform="translate(-20, -10)"/>
    <rect x="-4" y="-50" width="8" height="40" rx="4" fill="white" opacity="0.4" transform="translate(20, -10)"/>
  </g>
</svg>
